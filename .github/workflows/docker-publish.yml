# ─────────────────────────────────────────────────────────────────────────────
# Docker Image — Build, Test & Push to GitHub Container Registry
#
# Jobs:
#   1. build-test: Build amd64 image, run integration tests against echo server
#   2. publish:    Build multi-arch & push to ghcr.io (only on main/tags, after tests pass)
#
# Triggers:
#   - Push to main  → build + test + push (tags: latest, sha-<commit>)
#   - Version tag    → build + test + push (tags: 1.2.3, 1.2, 1, latest)
#   - Pull request   → build + test only (no push)
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEST_IMAGE: lite-gateway-ci

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build single-arch image & run integration tests
  # ─────────────────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build amd64 image for testing ──────────────────────────────────
      - name: Build Docker image (amd64)
        run: |
          docker build \
            -t ${{ env.TEST_IMAGE }}:test \
            -f src/LiteGateway.YarpProxy/Dockerfile .

      # ── Start echo backend + gateway with all header types ─────────────
      - name: Start test stack
        run: |
          docker network create test-net

          # Echo server: returns request details as JSON
          docker run -d --name echo-backend --network test-net \
            -e PORT=3000 \
            ealen/echo-server:0.9.2

          # Gateway with all header action types + _V suffix + GATEWAY_UPSTREAM
          docker run -d --name gateway --network test-net \
            -p 8080:8080 \
            -e MY_SECRET_TOKEN=resolved-secret-value \
            -e GATEWAY_UPSTREAM=http://echo-backend:3000 \
            -e PROXY_HEADER_X_TENANT_ID=customer-42 \
            -e PROXY_HEADER_SET_X_GATEWAY=lite-gw \
            -e PROXY_HEADER_APPEND_X_REQUEST_TAG=from-proxy \
            -e PROXY_HEADER_REMOVE_X_REMOVE_ME=true \
            -e PROXY_HEADER_RESPONSE_SET_X_POWERED_BY=lite-gateway \
            -e PROXY_HEADER_RESPONSE_APPEND_X_TRACE=proxy-hop \
            -e PROXY_HEADER_X_FROM_ENV_V=MY_SECRET_TOKEN \
            ${{ env.TEST_IMAGE }}:test

          # Wait for services to be ready
          echo "Waiting for gateway to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Gateway is ready after ${i}s"
              break
            fi
            sleep 1
          done

      # ── Show startup banner ────────────────────────────────────────────
      - name: Show gateway startup logs
        if: always()
        run: docker logs gateway

      # ── Integration tests ──────────────────────────────────────────────
      - name: Test — bare Set header (backward compat)
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/)
          echo "$RESPONSE" | jq .
          HEADER=$(echo "$RESPONSE" | jq -r '.request.headers["x-tenant-id"]')
          echo "x-tenant-id = $HEADER"
          [ "$HEADER" = "customer-42" ] || { echo "FAIL: expected customer-42"; exit 1; }
          echo "✅ PASS: bare Set header"

      - name: Test — SET_ prefix header
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/)
          HEADER=$(echo "$RESPONSE" | jq -r '.request.headers["x-gateway"]')
          echo "x-gateway = $HEADER"
          [ "$HEADER" = "lite-gw" ] || { echo "FAIL: expected lite-gw"; exit 1; }
          echo "✅ PASS: SET_ prefix header"

      - name: Test — APPEND_ prefix header
        run: |
          # Send a request with an existing X-Request-Tag header
          RESPONSE=$(curl -sf -H "X-Request-Tag: original" http://localhost:8080/)
          HEADER=$(echo "$RESPONSE" | jq -r '.request.headers["x-request-tag"]')
          echo "x-request-tag = $HEADER"
          echo "$HEADER" | grep -q "from-proxy" || { echo "FAIL: expected from-proxy in '$HEADER'"; exit 1; }
          echo "✅ PASS: APPEND_ prefix header"

      - name: Test — REMOVE_ prefix header
        run: |
          # Send a request WITH X-Remove-Me header — proxy should strip it
          RESPONSE=$(curl -sf -H "X-Remove-Me: secret-value" http://localhost:8080/)
          HEADER=$(echo "$RESPONSE" | jq -r '.request.headers["x-remove-me"] // "REMOVED"')
          echo "x-remove-me = $HEADER"
          [ "$HEADER" = "REMOVED" ] || { echo "FAIL: header should have been removed, got '$HEADER'"; exit 1; }
          echo "✅ PASS: REMOVE_ prefix header"

      - name: Test — RESPONSE_SET_ prefix header
        run: |
          # Check response headers (not body) for X-Powered-By
          HEADER=$(curl -sf -D- -o /dev/null http://localhost:8080/ | grep -i "x-powered-by" | tr -d '\r')
          echo "Response header: $HEADER"
          echo "$HEADER" | grep -qi "lite-gateway" || { echo "FAIL: expected lite-gateway in response header"; exit 1; }
          echo "✅ PASS: RESPONSE_SET_ prefix header"

      - name: Test — RESPONSE_APPEND_ prefix header
        run: |
          HEADER=$(curl -sf -D- -o /dev/null http://localhost:8080/ | grep -i "x-trace" | tr -d '\r')
          echo "Response header: $HEADER"
          echo "$HEADER" | grep -qi "proxy-hop" || { echo "FAIL: expected proxy-hop in response header"; exit 1; }
          echo "✅ PASS: RESPONSE_APPEND_ prefix header"

      - name: Test — multiple headers coexist
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/)
          TENANT=$(echo "$RESPONSE" | jq -r '.request.headers["x-tenant-id"]')
          GW=$(echo "$RESPONSE" | jq -r '.request.headers["x-gateway"]')
          echo "x-tenant-id=$TENANT  x-gateway=$GW"
          [ "$TENANT" = "customer-42" ] && [ "$GW" = "lite-gw" ] || { echo "FAIL"; exit 1; }
          echo "✅ PASS: all request headers coexist"

      - name: "Test — _V suffix resolves env var"
        run: |
          HEADER=$(curl -sf http://localhost:8080/ | jq -r '.request.headers["x-from-env"]')
          echo "x-from-env = $HEADER"
          [ "$HEADER" = "resolved-secret-value" ] || { echo "FAIL: expected resolved-secret-value, got $HEADER"; exit 1; }
          echo "✅ PASS: _V suffix resolved env var"

      - name: "Test — _V with missing ref crashes"
        run: |
          docker run --rm \
            -e PROXY_HEADER_X_BAD_V=NONEXISTENT_VAR \
            -e "ReverseProxy__Clusters__upstream__Destinations__default__Address=http://echo-backend:3000" \
            --network test-net \
            ${{ env.TEST_IMAGE }}:test 2>&1 | tee /tmp/crash_output || true
          grep -q "FATAL" /tmp/crash_output || { echo "FAIL: expected FATAL error"; exit 1; }
          grep -q "NONEXISTENT_VAR" /tmp/crash_output || { echo "FAIL: error should mention NONEXISTENT_VAR"; exit 1; }
          echo "✅ PASS: _V with missing ref crashes with clear error"

      - name: "Test — mTLS with PEM cert + key"
        run: |
          # Generate self-signed CA + server + client certs
          mkdir -p /tmp/certs
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/certs/ca.key -out /tmp/certs/ca.pem \
            -days 1 -nodes -subj "/CN=Test-CA" 2>/dev/null
          openssl req -newkey rsa:2048 -keyout /tmp/certs/server.key -out /tmp/certs/server.csr \
            -nodes -subj "/CN=mtls-backend" 2>/dev/null
          openssl x509 -req -in /tmp/certs/server.csr -CA /tmp/certs/ca.pem -CAkey /tmp/certs/ca.key \
            -CAcreateserial -out /tmp/certs/server.pem -days 1 \
            -extfile <(echo "subjectAltName=DNS:mtls-backend") 2>/dev/null
          openssl req -newkey rsa:2048 -keyout /tmp/certs/client.key -out /tmp/certs/client.csr \
            -nodes -subj "/CN=lite-gateway-client" 2>/dev/null
          openssl x509 -req -in /tmp/certs/client.csr -CA /tmp/certs/ca.pem -CAkey /tmp/certs/ca.key \
            -CAcreateserial -out /tmp/certs/client.pem -days 1 2>/dev/null

          # Write a standalone mTLS backend script (no pip install needed)
          cat > /tmp/certs/mtls_backend.py << 'PYEOF'
          import ssl, json
          from http.server import HTTPServer, BaseHTTPRequestHandler
          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  peer = self.connection.getpeercert()
                  cn = dict(x[0] for x in peer["subject"])["commonName"] if peer else "NONE"
                  body = json.dumps({"mtls_client_cn": cn})
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(body.encode())
              def log_message(self, *a): pass
          ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
          ctx.load_cert_chain("/certs/server.pem", "/certs/server.key")
          ctx.load_verify_locations("/certs/ca.pem")
          ctx.verify_mode = ssl.CERT_REQUIRED
          srv = HTTPServer(("0.0.0.0", 443), H)
          srv.socket = ctx.wrap_socket(srv.socket, server_side=True)
          print("mTLS backend ready on :443", flush=True)
          srv.serve_forever()
          PYEOF

          # Start mTLS backend using python:3.12-slim with pre-baked script
          docker run -d --name mtls-backend --network test-net \
            -v /tmp/certs:/certs:ro \
            python:3.12-slim python3 /certs/mtls_backend.py

          # Wait for backend to be ready
          echo "Waiting for mTLS backend..."
          for i in $(seq 1 30); do
            if docker logs mtls-backend 2>&1 | grep -q "mTLS backend ready"; then
              echo "mTLS backend ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Start gateway with mTLS client cert
          docker run -d --name mtls-gateway --network test-net \
            -p 9090:8080 \
            -v /tmp/certs:/certs:ro \
            -e GATEWAY_UPSTREAM=https://mtls-backend:443 \
            -e GATEWAY_TLS_CERT=/certs/client.pem \
            -e GATEWAY_TLS_KEY=/certs/client.key \
            -e GATEWAY_TLS_CA=/certs/ca.pem \
            ${{ env.TEST_IMAGE }}:test

          # Wait for gateway
          echo "Waiting for gateway..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/ > /dev/null 2>&1; then
              echo "Gateway ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Show logs for debugging
          echo "--- mtls-backend logs ---"
          docker logs mtls-backend 2>&1 | tail -5
          echo "--- mtls-gateway logs ---"
          docker logs mtls-gateway 2>&1 | tail -20

          # Verify the backend saw the client cert
          RESPONSE=$(curl -sf http://localhost:9090/ || echo '{"mtls_client_cn":"CURL_FAILED"}')
          echo "Response: $RESPONSE"
          CN=$(echo "$RESPONSE" | jq -r '.mtls_client_cn')
          echo "Backend saw client CN: $CN"
          [ "$CN" = "lite-gateway-client" ] || { echo "FAIL: expected lite-gateway-client, got $CN"; docker logs mtls-gateway; exit 1; }
          echo "✅ PASS: mTLS — backend received client cert CN=lite-gateway-client"

          # Cleanup mTLS containers
          docker rm -f mtls-gateway mtls-backend 2>/dev/null || true

      # ── Cleanup ────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker rm -f gateway echo-backend mtls-gateway mtls-backend 2>/dev/null || true
          docker network rm test-net 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Multi-arch build & push to GHCR (only after tests pass)
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to GHCR
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/LiteGateway.YarpProxy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
