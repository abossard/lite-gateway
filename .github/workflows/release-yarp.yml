# ─────────────────────────────────────────────────────────────────────────────
# YARP Proxy — Multi-Platform Native AOT Release
#
# Jobs:
#   1. build:   Build AOT binaries for 6 targets (matrix)
#   2. test:    Run integration tests with linux-x64 binary + echo server
#   3. release: Collect artifacts and create GitHub Release (only after tests pass)
#
# Triggered on version tags (v*) or manually.
#
# Matrix:
#   linux-x64, linux-arm64, win-x64, win-arm64, osx-x64, osx-arm64
# ─────────────────────────────────────────────────────────────────────────────

name: Release YARP Proxy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Leave empty for a dry-run build without release."
        required: false
        type: string

permissions:
  contents: write

env:
  PROJECT: src/LiteGateway.YarpProxy/LiteGateway.YarpProxy.csproj
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# ─────────────────────────────────────────────────────────────────────────────
# Build Job — runs once per matrix entry, produces a zipped artifact
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - rid: linux-x64
            os: ubuntu-latest
            artifact: LiteGateway.YarpProxy
            archive: tar

          - rid: linux-arm64
            os: ubuntu-latest
            artifact: LiteGateway.YarpProxy
            archive: tar
            cross: true

          # ── Windows ────────────────────────────────────────────────────────
          - rid: win-x64
            os: windows-latest
            artifact: LiteGateway.YarpProxy.exe
            archive: zip

          - rid: win-arm64
            os: windows-latest
            artifact: LiteGateway.YarpProxy.exe
            archive: zip

          # ── macOS ──────────────────────────────────────────────────────────
          - rid: osx-x64
            os: macos-14          # cross-compile x64 on ARM64 runner
            artifact: LiteGateway.YarpProxy
            archive: tar

          - rid: osx-arm64
            os: macos-14          # ARM64 (Apple Silicon) runner
            artifact: LiteGateway.YarpProxy
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Linux: install native AOT toolchain ──────────────────────────────
      - name: Install native toolchain (Linux x64)
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev

      - name: Install cross-compilation toolchain (Linux ARM64)
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64

          # Ubuntu 24.04 uses deb822 format — pin existing sources to amd64
          # and add arm64 sources from ports.ubuntu.com
          sudo sed -i 's/^Types: deb$/Architectures: amd64\nTypes: deb/' /etc/apt/sources.list.d/ubuntu.sources

          sudo tee /etc/apt/sources.list.d/arm64-ports.sources > /dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-security
          Components: main restricted universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            zlib1g-dev:arm64

      # ── macOS: add Swift static library paths for AOT linker ───────────
      - name: Setup Swift library paths (macOS)
        if: startsWith(matrix.rid, 'osx')
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || true
          XCODE_DEV="$(xcode-select -p)"
          SWIFT_STATIC="${XCODE_DEV}/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift_static/macosx"
          SWIFT_LIB="${XCODE_DEV}/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/macosx"
          echo "Adding Swift lib paths: ${SWIFT_STATIC} ${SWIFT_LIB}"
          echo "LIBRARY_PATH=${SWIFT_STATIC}:${SWIFT_LIB}${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      # ── Publish (restore + AOT compile in one step) ──────────────────────
      - name: Publish Native AOT
        shell: bash
        run: |
          extra_args=""
          if [ "${{ matrix.cross }}" = "true" ]; then
            extra_args="/p:LinkerFlavor=lld /p:ObjCopyName=aarch64-linux-gnu-objcopy"
            export CC=aarch64-linux-gnu-gcc
          fi
          dotnet publish ${{ env.PROJECT }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -o publish/${{ matrix.rid }} \
            $extra_args

      # ── Package ──────────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf ../../LiteGateway.YarpProxy-${{ matrix.rid }}.tar.gz ${{ matrix.artifact }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "publish/${{ matrix.rid }}/${{ matrix.artifact }}" `
            -DestinationPath "LiteGateway.YarpProxy-${{ matrix.rid }}.zip"

      # ── Upload Artifact ──────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteGateway.YarpProxy-${{ matrix.rid }}
          path: LiteGateway.YarpProxy-${{ matrix.rid }}.*
          retention-days: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Test Job — downloads the linux-x64 binary, runs it against echo server,
  # and verifies all 6 header action types end-to-end.
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest

    services:
      echo-backend:
        image: ealen/echo-server:0.9.2
        env:
          PORT: "3000"
        ports:
          - 3000:3000

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: LiteGateway.YarpProxy-linux-x64

      - name: Extract binary
        run: |
          tar xzf LiteGateway.YarpProxy-linux-x64.tar.gz
          chmod +x LiteGateway.YarpProxy
          ls -lh LiteGateway.YarpProxy

      - name: Start gateway
        run: |
          export ASPNETCORE_URLS=http://+:8080
          export PROXY_HEADER_X_TENANT_ID=customer-42
          export PROXY_HEADER_SET_X_GATEWAY=lite-gw
          export PROXY_HEADER_APPEND_X_REQUEST_TAG=from-proxy
          export PROXY_HEADER_REMOVE_X_REMOVE_ME=true
          export PROXY_HEADER_RESPONSE_SET_X_POWERED_BY=lite-gateway
          export PROXY_HEADER_RESPONSE_APPEND_X_TRACE=proxy-hop
          export ReverseProxy__Clusters__upstream__Destinations__default__Address=http://localhost:3000

          ./LiteGateway.YarpProxy &

          echo "Waiting for gateway..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Gateway ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/ > /dev/null || { echo "Gateway failed to start"; exit 1; }

      - name: "Test: bare Set header (backward compat)"
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/)
          echo "$RESPONSE" | jq .
          HEADER=$(echo "$RESPONSE" | jq -r '.request.headers["x-tenant-id"]')
          [ "$HEADER" = "customer-42" ] || { echo "FAIL: expected customer-42, got $HEADER"; exit 1; }
          echo "✅ bare Set: x-tenant-id=$HEADER"

      - name: "Test: SET_ prefix header"
        run: |
          HEADER=$(curl -sf http://localhost:8080/ | jq -r '.request.headers["x-gateway"]')
          [ "$HEADER" = "lite-gw" ] || { echo "FAIL: expected lite-gw, got $HEADER"; exit 1; }
          echo "✅ SET_: x-gateway=$HEADER"

      - name: "Test: APPEND_ prefix header"
        run: |
          HEADER=$(curl -sf -H "X-Request-Tag: original" http://localhost:8080/ | jq -r '.request.headers["x-request-tag"]')
          echo "$HEADER" | grep -q "from-proxy" || { echo "FAIL: expected from-proxy in '$HEADER'"; exit 1; }
          echo "✅ APPEND_: x-request-tag=$HEADER"

      - name: "Test: REMOVE_ prefix header"
        run: |
          HEADER=$(curl -sf -H "X-Remove-Me: secret-value" http://localhost:8080/ | jq -r '.request.headers["x-remove-me"] // "REMOVED"')
          [ "$HEADER" = "REMOVED" ] || { echo "FAIL: header should have been removed, got '$HEADER'"; exit 1; }
          echo "✅ REMOVE_: header stripped"

      - name: "Test: RESPONSE_SET_ prefix header"
        run: |
          HEADER=$(curl -sf -D- -o /dev/null http://localhost:8080/ | grep -i "x-powered-by" | tr -d '\r')
          echo "$HEADER" | grep -qi "lite-gateway" || { echo "FAIL: x-powered-by not in response headers"; exit 1; }
          echo "✅ RESPONSE_SET_: $HEADER"

      - name: "Test: RESPONSE_APPEND_ prefix header"
        run: |
          HEADER=$(curl -sf -D- -o /dev/null http://localhost:8080/ | grep -i "x-trace" | tr -d '\r')
          echo "$HEADER" | grep -qi "proxy-hop" || { echo "FAIL: x-trace not in response headers"; exit 1; }
          echo "✅ RESPONSE_APPEND_: $HEADER"

      - name: "Test: multiple headers coexist"
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/)
          TENANT=$(echo "$RESPONSE" | jq -r '.request.headers["x-tenant-id"]')
          GW=$(echo "$RESPONSE" | jq -r '.request.headers["x-gateway"]')
          [ "$TENANT" = "customer-42" ] && [ "$GW" = "lite-gw" ] || { echo "FAIL: tenant=$TENANT gw=$GW"; exit 1; }
          echo "✅ coexist: x-tenant-id=$TENANT x-gateway=$GW"

  # ───────────────────────────────────────────────────────────────────────────
  # Release Job — collects all artifacts and creates a GitHub Release
  # (only runs after tests pass)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: YARP Proxy ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## YARP Reverse Proxy — Native AOT Binaries

            Self-contained, single-file binaries with **zero runtime dependencies**.

            ### Download

            | Platform | Architecture | File |
            | --- | --- | --- |
            | **Linux** | x64 | `LiteGateway.YarpProxy-linux-x64.tar.gz` |
            | **Linux** | ARM64 | `LiteGateway.YarpProxy-linux-arm64.tar.gz` |
            | **Windows** | x64 | `LiteGateway.YarpProxy-win-x64.zip` |
            | **Windows** | ARM64 | `LiteGateway.YarpProxy-win-arm64.zip` |
            | **macOS** | x64 (Intel) | `LiteGateway.YarpProxy-osx-x64.tar.gz` |
            | **macOS** | ARM64 (Apple Silicon) | `LiteGateway.YarpProxy-osx-arm64.tar.gz` |

            ### Quick Start

            ```bash
            # Linux / macOS
            tar xzf LiteGateway.YarpProxy-linux-x64.tar.gz
            chmod +x LiteGateway.YarpProxy
            ./LiteGateway.YarpProxy

            # Windows (PowerShell)
            Expand-Archive LiteGateway.YarpProxy-win-x64.zip -DestinationPath .
            .\LiteGateway.YarpProxy.exe
            ```

            See [docs/yarp-proxy-windows.md](docs/yarp-proxy-windows.md) for Windows deployment guide.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
