# =============================================================================
# Lite Gateway — Docker Compose
# =============================================================================
# YARP reverse proxy with echo backend and Aspire Dashboard for live telemetry.
#
# Usage:
#   docker compose up --build
#   curl -s http://localhost:8080/ | jq .request.headers
#   curl -s http://localhost:8081/ | jq .request.headers
#   open http://localhost:18888   ← Aspire Dashboard (traces, metrics, logs)
#
# You should see the injected "X-Custom-Header" in the response.
# =============================================================================

services:
  # ── Echo backend (returns request details as JSON) ───────────────────────
  backend:
    image: ealen/echo-server:0.9.2
    environment:
      PORT: "3000"

  # ── YARP Proxy ───────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: src/LiteGateway.YarpProxy/Dockerfile
    volumes:
      - ./config/yarp.json:/app/config.json:ro
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "lite-gateway"
    depends_on:
      - backend
      - aspire-dashboard
  gateway_env_based:
    build:
      context: .
      dockerfile: src/LiteGateway.YarpProxy/Dockerfile
    ports:
      - "8081:8080"
    environment:
      # Upstream backend
      ReverseProxy__Clusters__upstream__Destinations__default__Address: "http://backend:3000"
      # Header transform (shorthand)
      PROXY_HEADER_X_CUSTOM_HEADER_V: "EXISTING_SPECIAL_VALUE"
      EXISTING_SPECIAL_VALUE: "should-be-overridden"
      # Telemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "lite-gateway-env"
    depends_on:
      - backend
      - aspire-dashboard

  # ── Aspire Dashboard (traces, metrics, logs viewer) ─────────────────────
  # Open http://localhost:18888 to see live telemetry from the gateway.
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    ports:
      - "18888:18888"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
