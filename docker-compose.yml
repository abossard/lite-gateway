# =============================================================================
# Lite Gateway — Docker Compose
# =============================================================================
# YARP reverse proxy that forwards requests to a backend and injects custom
# HTTP headers. Uses an echo server as the demo backend so you can inspect
# which headers arrive.
#
# Usage:
#   docker compose up --build
#   curl -s http://localhost:8080/ | jq .headers
#
# You should see the injected "X-Custom-Header" in the response.
# =============================================================================

services:
  # ── Echo backend (returns request details as JSON) ───────────────────────
  backend:
    image: ealen/echo-server:0.9.2
    environment:
      PORT: "3000"

  # ── YARP Proxy ───────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: src/LiteGateway.YarpProxy/Dockerfile
    volumes:
      - ./config/yarp.json:/app/config.json:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend
